enabled: true
cluster_name: prod-cluster

telegram:
  bot_token: "123456:replace-me"
  chat_ids:
    - "-1001234567890"
  notification_template: |
    🚨 *{{title}}*

    *动作*: `{{action_label}}`
    *集群*: `{{cluster}}`
    *资源*: `{{resource}}`
    *用户*: `{{user}}`
    *操作*: `{{operation}}`
    *原因*: {{reason}}
    *请求ID*: `{{request_uid}}`
    *时间*: `{{time}}`

audit:
  enabled: true
  directory: /var/log/k8s-delete-interceptor
  file_retention_days: 7
  telegram:
    use_global: true
    bot_token: ""
    chat_ids: []
    notification_template: |
      📝 *{{title}}*

      *动作*: `{{action_label}}`
      *集群*: `{{cluster}}`
      *资源*: `{{resource}}`
      *用户*: `{{user}}`
      *操作*: `{{operation}}`
      *原因*: {{reason}}
      *请求ID*: `{{request_uid}}`
      *时间*: `{{time}}`
  create:
    enabled: true
    notify_users:
      - "*k8s-cicd-sa*"
    notify_resources:
      - "deployment"
      - "statefulset"
      - "daemonset"
      - "pod"
      - "pvc"
      - "pv"
      - "service"
      - "svc"
      - "configmap"
      - "secret"
      - "ingress"
      - "namespace"
      - "serviceaccount"
      - "sa"
      - "role"
      - "clusterrole"
      - "rolebinding"
      - "clusterrolebinding"
      - "storageclass"
  update:
    enabled: true
    notify_users:
      - "*k8s-cicd-sa*"
    notify_resources:
      - "deployment"
      - "statefulset"
      - "daemonset"
      - "pod"
      - "pvc"
      - "pv"
      - "service"
      - "svc"
      - "configmap"
      - "secret"
      - "ingress"
      - "namespace"
      - "serviceaccount"
      - "sa"
      - "role"
      - "clusterrole"
      - "rolebinding"
      - "clusterrolebinding"
      - "storageclass"
  mongo:
    enabled: false
    uri: "mongodb://mongodb.mongodb.svc.cluster.local:27017"
    database: "k8s_delete_interceptor"
    collection: "admission_audit"
    retention_days: 30
    connect_timeout_seconds: 5

user_policies:
  - action: allow
    users:
      - "*k8s-cicd-sa*"

  - action: observe
    users:
      - "regex:^system:serviceaccount:monitoring:.*$"

  - action: deny
    users:
      - "*dangerous-sa*"

protected:
  - kind: Namespace
    names:
      - kube-system
      - prod-*

  - kind: Deployment
    names:
      - ingress-*
      - argocd-*

apiVersion: apps/v1
kind: Deployment
metadata:
  name: delete-interceptor
  namespace: webhook-system
  labels:
    app.kubernetes.io/name: delete-interceptor
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: delete-interceptor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: delete-interceptor
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: delete-interceptor
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: webhook
          image: ghcr.io/replace-me/k8s-delete-interceptor:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          args:
            - -config=/etc/config/protected.yaml
            - -tlscert=/etc/certs/tls.crt
            - -tlskey=/etc/certs/tls.key
          ports:
            - name: https
              containerPort: 8443
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/config
              readOnly: true
            - name: tls
              mountPath: /etc/certs
              readOnly: true
            - name: audit
              mountPath: /var/log/k8s-delete-interceptor
              subPathExpr: $(POD_NAME)
            - name: audit
              mountPath: /var/lib/k8s-delete-interceptor
              subPath: shared
      volumes:
        - name: config
          configMap:
            name: delete-interceptor-config
            items:
              - key: protected.yaml
                path: protected.yaml
        - name: tls
          secret:
            secretName: delete-interceptor-serving-cert
        - name: audit
          persistentVolumeClaim:
            claimName: delete-interceptor-audit-pvc

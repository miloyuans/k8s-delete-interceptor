enabled: true
cluster_name: prod-cluster

telegram:
  bot_token: "123456:replace-me"
  chat_ids:
    - "-1001234567890"
  notification_template: |
    *动作*: {{action_icon}} `{{action_label}}`
    *集群*: `{{cluster}}`
    *资源类型*: `{{resource_type}}`
    *资源名称*: `{{resource_name}}`
    *命名空间*: `{{namespace}}`
    *用户*: `{{user}}`
    *操作*: `{{operation_label}}`
    *变更详情*:
    {{change_details}}
    *请求ID*: `{{request_uid}}`

    {{title_icon}} *{{title}}*   `{{time}}`

notifications:
  dedupe_window_seconds: 300
  retry_failed_on_startup: true
  max_retry_batch: 50

delete_confirmation:
  enabled: true
  state_directory: /var/lib/k8s-delete-interceptor
  chat_ids:
    - "-1001234567890"
  ttl_seconds: 300
  consume_window_seconds: 60
  aggregate_window_seconds: 2
  poll_interval_seconds: 2
  max_items_per_message: 20
  rules:
    - users:
        - "*k8s-cicd-sa*"
      telegram_ids:
        - "123456789"

global_whitelist:
  users:
    - "*breakglass*"
    - "*admin-*"

audit:
  enabled: true
  directory: /var/log/k8s-delete-interceptor
  file_retention_days: 7
  telegram:
    use_global: true
    bot_token: ""
    chat_ids: []
    notification_template: |
      *动作*: {{action_icon}} `{{action_label}}`
      *集群*: `{{cluster}}`
      *资源类型*: `{{resource_type}}`
      *资源名称*: `{{resource_name}}`
      *命名空间*: `{{namespace}}`
      *用户*: `{{user}}`
      *操作*: `{{operation_label}}`
      *变更详情*:
      {{change_details}}
      *请求ID*: `{{request_uid}}`

      {{title_icon}} *{{title}}*   `{{time}}`
  create:
    enabled: true
    notify_users:
      - "*k8s-cicd-sa*"
    notify_resources:
      - "deployment"
      - "statefulset"
      - "daemonset"
      - "pod"
      - "pvc"
      - "pv"
      - "service"
      - "svc"
      - "configmap"
      - "secret"
      - "ingress"
      - "namespace"
      - "serviceaccount"
      - "sa"
      - "role"
      - "clusterrole"
      - "rolebinding"
      - "clusterrolebinding"
      - "storageclass"
  update:
    enabled: true
    notify_users:
      - "*k8s-cicd-sa*"
    notify_resources:
      - "deployment"
      - "statefulset"
      - "daemonset"
      - "pod"
      - "pvc"
      - "pv"
      - "service"
      - "svc"
      - "configmap"
      - "secret"
      - "ingress"
      - "namespace"
      - "serviceaccount"
      - "sa"
      - "role"
      - "clusterrole"
      - "rolebinding"
      - "clusterrolebinding"
      - "storageclass"
  mongo:
    enabled: false
    uri: "mongodb://mongodb.mongodb.svc.cluster.local:27017"
    database: "k8s_delete_interceptor"
    collection: "admission_audit"
    retention_days: 30
    connect_timeout_seconds: 5

lifecycle:
  enabled: true
  notify_startup: true
  notify_shutdown: true
  detect_unclean_shutdown: true
  telegram:
    use_global: true
    bot_token: ""
    chat_ids: []
    notification_template: |
      *状态*: {{action_icon}} `{{action_label}}`
      *集群*: `{{cluster}}`
      *实例*: `{{resource}}`
      *操作*: `{{operation_label}}`
      *变更详情*:
      {{change_details}}

      {{title_icon}} *{{title}}*   `{{time}}`

protected:
  - kind: Namespace
    names:
      - kube-system
      - prod-*

  - kind: Deployment
    names:
      - ingress-*
      - argocd-*

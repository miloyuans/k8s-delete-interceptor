apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: delete-interceptor.k8s.io
  annotations:
    cert-manager.io/inject-ca-from: webhook-system/delete-interceptor-serving-cert
webhooks:
  - name: delete.delete-interceptor.k8s.io
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    matchPolicy: Equivalent
    timeoutSeconds: 5
    clientConfig:
      service:
        namespace: webhook-system
        name: delete-interceptor-svc
        path: /validate
        port: 443
    rules:
      - apiGroups:
          - "*"
        apiVersions:
          - "*"
        operations:
          - CREATE
          - UPDATE
          - DELETE
        resources:
          - "*"
        scope: "*"

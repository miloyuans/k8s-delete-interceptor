apiVersion: v1
kind: Service
metadata:
  name: delete-interceptor-mongodb-headless
  namespace: webhook-system
  labels:
    k8s-delete-interceptor.io/system-resource: internal-mongodb
spec:
  clusterIP: None
  selector:
    app: delete-interceptor-mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: delete-interceptor-mongodb
  namespace: webhook-system
  labels:
    k8s-delete-interceptor.io/system-resource: internal-mongodb
spec:
  selector:
    app: delete-interceptor-mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: delete-interceptor-mongodb
  namespace: webhook-system
  labels:
    app: delete-interceptor-mongodb
    k8s-delete-interceptor.io/system-resource: internal-mongodb
spec:
  serviceName: delete-interceptor-mongodb-headless
  replicas: 1
  selector:
    matchLabels:
      app: delete-interceptor-mongodb
  template:
    metadata:
      labels:
        app: delete-interceptor-mongodb
        k8s-delete-interceptor.io/system-resource: internal-mongodb
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongodb
          image: mongodb/mongodb-community-server:8.0-ubi8
          imagePullPolicy: IfNotPresent
          args: ["--replSet", "rs0", "--bind_ip_all"]
          ports:
            - containerPort: 27017
              name: mongodb
          envFrom:
            - secretRef:
                name: delete-interceptor-mongodb-secret
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          k8s-delete-interceptor.io/system-resource: internal-mongodb
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: delete-interceptor-mongodb-init
  namespace: webhook-system
  labels:
    k8s-delete-interceptor.io/system-resource: internal-mongodb
spec:
  template:
    metadata:
      labels:
        k8s-delete-interceptor.io/system-resource: internal-mongodb
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: mongodb/mongodb-community-server:8.0-ubi8
          envFrom:
            - secretRef:
                name: delete-interceptor-mongodb-secret
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              HOST="delete-interceptor-mongodb-0.delete-interceptor-mongodb-headless.webhook-system.svc.cluster.local:27017"
              until mongosh --host "$HOST" --quiet --eval "db.adminCommand('ping').ok" >/dev/null 2>&1; do sleep 2; done
              mongosh --host "$HOST" --quiet <<'JS'
              try { rs.initiate({_id:'rs0',members:[{_id:0,host:'delete-interceptor-mongodb-0.delete-interceptor-mongodb-headless.webhook-system.svc.cluster.local:27017'}]}) } catch(e) { print(e.message) }
              JS
              sleep 5
              mongosh --host "$HOST" --quiet <<JS
              db = db.getSiblingDB('admin')
              if (!db.getUser('${MONGO_APP_USERNAME}')) {
                db.createUser({user:'${MONGO_APP_USERNAME}', pwd:'${MONGO_APP_PASSWORD}', roles:[{role:'readWrite', db:'k8s_delete_interceptor'}]})
              }
              JS

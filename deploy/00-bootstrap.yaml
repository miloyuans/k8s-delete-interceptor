apiVersion: v1
kind: Namespace
metadata:
  name: webhook-system
  labels:
    name: webhook-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: delete-interceptor
  namespace: webhook-system
  labels:
    app.kubernetes.io/name: k8s-delete-interceptor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: delete-interceptor
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings", "clusterrolebindings", "roles", "clusterroles"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: delete-interceptor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: delete-interceptor
subjects:
  - kind: ServiceAccount
    name: delete-interceptor
    namespace: webhook-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: delete-interceptor-shared-pvc
  namespace: webhook-system
  labels:
    app.kubernetes.io/name: k8s-delete-interceptor
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: <YOUR_RWX_STORAGE_CLASS>
  resources:
    requests:
      storage: 30Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: delete-interceptor-web-secret
  namespace: webhook-system
type: Opaque
stringData:
  WEB_ADMIN_TOKEN: "change-me-admin-token"
---
apiVersion: v1
kind: Secret
metadata:
  name: delete-interceptor-mongodb-secret
  namespace: webhook-system
  labels:
    k8s-delete-interceptor.io/system-resource: internal-mongodb
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: root
  MONGO_INITDB_ROOT_PASSWORD: change-me-root-password
  MONGO_APP_USERNAME: interceptor
  MONGO_APP_PASSWORD: change-me-app-password
  MONGO_URI: "mongodb://interceptor:change-me-app-password@delete-interceptor-mongodb-0.delete-interceptor-mongodb-headless.webhook-system.svc.cluster.local:27017/k8s_delete_interceptor?authSource=admin&replicaSet=rs0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: delete-interceptor-config
  namespace: webhook-system
  labels:
    app.kubernetes.io/name: k8s-delete-interceptor
data:
  runtime-config.yaml: |
    version: 1
    enabled: true
    cluster_name: prod-cluster
    storage:
      root_dir: /var/lib/k8s-delete-interceptor
      cleanup_synced_after: 7d
      warn_usage_percent: 75
      critical_usage_percent: 90
      compress_synced_events: true
      use_shared_approval_fallback: true
    defaults:
      unmatched:
        create: audit_only
        update: audit_only
        delete: audit_only
    data_sources:
      - id: internal_mongo_default
        name: 内置 MongoDB
        type: internal_mongodb
        enabled: true
        active: true
        uri_env: MONGO_URI
        database: k8s_delete_interceptor
        namespace: webhook-system
        service: delete-interceptor-mongodb
        secret_name: delete-interceptor-mongodb-secret
        replica_set: rs0
    audit:
      enabled: true
      prefer_mongo: true
      record_noise_events: true
      write_admission_request: false
    rollback:
      enabled: true
      create_delete_rollback: false
      require_dry_run: true
    system_protection:
      enabled: true
      system_resource_label: k8s-delete-interceptor.io/system-resource
      internal_mongodb_resource_value: internal-mongodb
      protected_namespaces: ["webhook-system"]
      allow_webhook_self_maintenance: true
    telegram:
      enabled: false
      bots: []
      chats: []
      users: []

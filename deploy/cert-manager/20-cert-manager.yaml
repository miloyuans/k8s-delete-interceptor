apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: delete-interceptor-selfsigned
  namespace: webhook-system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: delete-interceptor-ca
  namespace: webhook-system
spec:
  isCA: true
  commonName: delete-interceptor-ca
  secretName: delete-interceptor-ca
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    kind: Issuer
    name: delete-interceptor-selfsigned
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: delete-interceptor-ca-issuer
  namespace: webhook-system
spec:
  ca:
    secretName: delete-interceptor-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: delete-interceptor-serving-cert
  namespace: webhook-system
spec:
  secretName: delete-interceptor-serving-cert
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    kind: Issuer
    name: delete-interceptor-ca-issuer
  dnsNames:
    - delete-interceptor-svc
    - delete-interceptor-svc.webhook-system
    - delete-interceptor-svc.webhook-system.svc
    - delete-interceptor-svc.webhook-system.svc.cluster.local
  usages:
    - digital signature
    - key encipherment
    - server auth

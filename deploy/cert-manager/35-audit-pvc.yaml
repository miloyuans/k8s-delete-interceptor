apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: delete-interceptor-audit-pvc
  namespace: webhook-system
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  # Replace with a RWX-capable StorageClass in your cluster, for example EFS/NFS/CephFS.
  storageClassName: replace-with-rwx-storageclass
